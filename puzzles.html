<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Puzzle Core</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:black;
  font-family:Arial;
  color:white;
  transition:0.4s;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
  background-size:40px 40px;
  animation:grid 10s linear infinite;
}

@keyframes grid{
  from{background-position:0 0}
  to{background-position:80px 80px}
}

.container{
  width:95%;
  max-width:1100px;
  margin:30px auto;
  padding:25px;
  border-radius:20px;
  border:1px solid #00eaff;
  background:rgba(0,10,15,.9);
  box-shadow:0 0 30px #00eaff55;
  position:relative;
}

h1{
  text-align:center;
  color:#00eaff;
}

.top{
  display:flex;
  justify-content:space-between;
  margin:20px 0;
  flex-wrap:wrap;
}

.box{
  border:1px solid #00eaff;
  padding:12px 18px;
  border-radius:12px;
  background:#001018;
}

.bar{
  height:12px;
  border:1px solid #00eaff;
  border-radius:999px;
  overflow:hidden;
  margin:20px 0;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00eaff,#00ff99);
  transition:.3s;
}

.game{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.visual{
  border:1px solid #00eaff55;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  padding:20px;
}

.panel{
  border:1px solid #00eaff55;
  border-radius:15px;
  padding:20px;
}

.tipo{
  color:#00ff99;
}

.pregunta{
  font-size:22px;
  margin:15px 0;
}

.opciones{
  display:grid;
  gap:10px;
}

button{
  padding:14px;
  border-radius:10px;
  border:1px solid #00eaff;
  background:black;
  color:#00eaff;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#00eaff;
  color:black;
}

.correcto{
  background:#00ff99!important;
  color:black!important;
}

.error{
  background:#ff244f!important;
  color:white!important;
}

.final{
  display:none;
  text-align:center;
  padding:20px;
}

@media(max-width:800px){
  .game{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 PUZZLE CORE</h1>

<div class="top">
  <div class="box" id="puntos">Puntos: 0</div>
  <div class="box" id="vidas">Vidas: 5 ❤️</div>
  <div class="box" id="contador">1/5</div>
</div>

<div class="bar">
  <div class="fill" id="barra"></div>
</div>

<div class="game" id="game">

  <div class="visual" id="visual"></div>

  <div class="panel">
    <div class="tipo" id="tipo"></div>
    <div class="pregunta" id="pregunta"></div>

    <div class="opciones">
      <button onclick="responder(0)" id="b0"></button>
      <button onclick="responder(1)" id="b1"></button>
      <button onclick="responder(2)" id="b2"></button>
      <button onclick="responder(3)" id="b3"></button>
    </div>

    <h3 id="msg"></h3>
  </div>

</div>

<div class="final" id="final">
  <h2 id="resultado"></h2>
  <button onclick="location.reload()">REINTENTAR</button>
</div>

</div>

<script>

let puntos=0;
let vidas=5;
let actual=0;
let total=5;

const puzzles=[
{t:"SECUENCIA",v:"2 → 4 → 8 → ?",p:"¿Siguiente?",o:["10","12","16","14"],c:2,color:"#00eaff"},
{t:"SECUENCIA",v:"3 → 6 → 12 → ?",p:"¿Continúa?",o:["18","24","30","36"],c:1,color:"#00eaff"},

{t:"MEMORIA",v:"🔐 7 - 2 - 9",p:"¿Código?",o:["729","792","279","927"],c:0,color:"#ff244f"},
{t:"MEMORIA",v:"⚡ A - 4 - Z",p:"¿Código correcto?",o:["A4Z","AZ4","4AZ","Z4A"],c:0,color:"#ff244f"},

{t:"LÓGICA",v:"CPU + RAM + ?",p:"¿Falta?",o:["Fuente","Mouse","Teclado","Pantalla"],c:0,color:"#00ff99"},
{t:"LÓGICA",v:"Entrada → Proceso → ?",p:"¿Resultado?",o:["Salida","Error","Cable","Luz"],c:0,color:"#00ff99"},

{t:"PATRÓN",v:"🔴 🔵 🔴 🔵 ?",p:"¿Sigue?",o:["🔴","🔵","⚫","🟢"],c:1,color:"#ffcc00"},
{t:"PATRÓN",v:"▲ ▲ ■ ■ ▲ ▲ ?",p:"¿Siguiente?",o:["■","▲","◆","●"],c:0,color:"#ffcc00"},

{t:"CÓDIGO",v:"A=1 B=2 C=?",p:"¿Valor?",o:["2","3","4","5"],c:1,color:"#aa00ff"},
{t:"CÓDIGO",v:"Z=26 Y=25 X=?",p:"¿Valor?",o:["24","23","22","21"],c:0,color:"#aa00ff"}
];

function rand(arr){
  return arr.sort(()=>Math.random()-0.5);
}

let partida=rand([...puzzles]).slice(0,total);

function cargar(){

  if(actual>=total){
    terminar();
    return;
  }

  let p=partida[actual];

  document.body.style.background=p.color;

  document.getElementById("tipo").innerText=p.t;
  document.getElementById("visual").innerText=p.v;
  document.getElementById("pregunta").innerText=p.p;

  document.getElementById("contador").innerText=(actual+1)+"/5";

  let ops=rand(p.o.map((txt,i)=>({txt,ok:i===p.c})));

  for(let i=0;i<4;i++){
    let b=document.getElementById("b"+i);
    b.innerText=ops[i].txt;
    b.dataset.ok=ops[i].ok;
    b.className="";
    b.disabled=false;
  }

}

function responder(i){

  let b=document.getElementById("b"+i);

  let ok=b.dataset.ok==="true";

  for(let j=0;j<4;j++){
    document.getElementById("b"+j).disabled=true;
  }

  if(ok){
    puntos+=100;
    b.classList.add("correcto");
    document.getElementById("msg").innerText="Correcto +100";
  }else{
    puntos-=20;
    vidas--;
    b.classList.add("error");
    document.getElementById("msg").innerText="Error -20";
  }

  actual++;

  document.getElementById("puntos").innerText="Puntos: "+puntos;
  document.getElementById("vidas").innerText="Vidas: "+vidas+" ❤️";
  document.getElementById("barra").style.width=(actual/total*100)+"%";

  if(vidas<=0){
    setTimeout(terminar,800);
    return;
  }

  setTimeout(cargar,800);
}

function terminar(){
  document.getElementById("game").style.display="none";
  document.getElementById("final").style.display="block";

  document.getElementById("resultado").innerText="Resultado final: "+puntos;

  localStorage.setItem("logicaScore",puntos);
}

cargar();

</script>

</body>
</html>
</script>

</body>
</html>
