<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Misión Hardware Pro</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at top, #082b35 0%, #050505 45%, #000 100%);
  color: #eaffff;
  font-family: Arial, sans-serif;
  text-align: center;
}

.contenedor {
  width: 90%;
  max-width: 950px;
  margin: 40px auto;
  padding: 30px;
  border: 2px solid #00f7ff;
  border-radius: 20px;
  background: rgba(0, 20, 25, 0.88);
  box-shadow: 0 0 25px #00f7ff55;
}

h1 {
  color: #00f7ff;
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitulo {
  color: #9ffcff;
  margin-bottom: 25px;
}

.panel {
  display: flex;
  justify-content: space-around;
  gap: 15px;
  flex-wrap: wrap;
  margin-bottom: 25px;
}

.caja {
  border: 1px solid #00f7ff;
  border-radius: 12px;
  padding: 12px 20px;
  background: rgba(0, 247, 255, 0.08);
  min-width: 150px;
  font-weight: bold;
}

.barra {
  width: 100%;
  height: 18px;
  border: 1px solid #00f7ff;
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0;
  background: #001014;
}

.progreso {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00f7ff, #00ff99);
  transition: 0.4s;
}

.tarjeta {
  margin-top: 25px;
  padding: 30px;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid #00f7ff77;
}

.pregunta {
  font-size: 26px;
  margin-bottom: 25px;
  color: white;
}

.opciones {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

button {
  padding: 18px;
  font-size: 17px;
  background: #020202;
  border: 2px solid #00f7ff;
  color: #00f7ff;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #00f7ff;
  color: black;
  transform: scale(1.03);
}

.correcta {
  background: #00ff99 !important;
  color: black !important;
  border-color: #00ff99 !important;
}

.incorrecta {
  background: #ff244f !important;
  color: white !important;
  border-color: #ff244f !important;
}

.mensaje {
  min-height: 35px;
  margin-top: 22px;
  font-size: 20px;
  font-weight: bold;
}

.final {
  display: none;
}

.volver {
  margin-top: 25px;
  border-color: #ffffff;
  color: white;
}

.volver:hover {
  background: white;
  color: black;
}

@media (max-width: 700px) {
  .opciones {
    grid-template-columns: 1fr;
  }

  h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<div class="contenedor">

  <h1>🔧 HARDWARE ARENA</h1>
  <p class="subtitulo">Responde 5 retos aleatorios. Solo tienes 2 chances.</p>

  <div class="panel">
    <div class="caja" id="score">Puntos: 0</div>
    <div class="caja" id="vidas">Chances: 2</div>
    <div class="caja" id="contador">Pregunta: 1/5</div>
  </div>

  <div class="barra">
    <div class="progreso" id="progreso"></div>
  </div>

  <div class="tarjeta" id="juego">
    <div class="pregunta" id="pregunta"></div>

    <div class="opciones">
      <button id="op0" onclick="responder(0)"></button>
      <button id="op1" onclick="responder(1)"></button>
      <button id="op2" onclick="responder(2)"></button>
      <button id="op3" onclick="responder(3)"></button>
    </div>

    <div class="mensaje" id="mensaje"></div>
  </div>

  <div class="tarjeta final" id="final">
    <h2 id="tituloFinal"></h2>
    <p id="textoFinal"></p>
    <button onclick="reiniciar()">🔁 Jugar otra vez</button>
    <button class="volver" onclick="window.location.href='index.html'">⬅ Volver al HUB</button>
  </div>

  <br>
  <button class="volver" onclick="window.location.href='index.html'">⬅ Volver al HUB</button>

</div>

function mezclar(array) {
  return array.sort(() => Math.random() - 0.5);
}

function iniciarJuego() {
  preguntasPartida = mezclar([...bancoPreguntas]).slice(0, totalPreguntas);
  preguntaActual = 0;
  chances = 2;

  document.getElementById("juego").style.display = "block";
  document.getElementById("final").style.display = "none";

  cargarPregunta();
}

function cargarPregunta() {
  if (preguntaActual >= totalPreguntas) {
    terminarJuego(true);
    return;
  }

  let p = preguntasPartida[preguntaActual];

  document.getElementById("pregunta").innerText = p.pregunta;
  document.getElementById("contador").innerText = "Pregunta: " + (preguntaActual + 1) + "/" + totalPreguntas;
  document.getElementById("vidas").innerText = "Chances: " + chances;
  document.getElementById("score").innerText = "Puntos: " + puntos;
  document.getElementById("progreso").style.width = ((preguntaActual) / totalPreguntas * 100) + "%";
  document.getElementById("mensaje").innerText = "";

  let opcionesMezcladas = p.opciones.map((texto, index) => {
    return { texto: texto, esCorrecta: index === p.correcta };
  });

  opcionesMezcladas = mezclar(opcionesMezcladas);

  for (let i = 0; i < 4; i++) {
    let boton = document.getElementById("op" + i);
    boton.innerText = opcionesMezcladas[i].texto;
    boton.dataset.correcta = opcionesMezcladas[i].esCorrecta;
    boton.disabled = false;
    boton.className = "";
  }
}

function responder(num) {
  let boton = document.getElementById("op" + num);
  let esCorrecta = boton.dataset.correcta === "true";

  desactivarBotones();

  if (esCorrecta) {
    puntos += 100;
    boton.classList.add("correcta");
    document.getElementById("mensaje").innerText = "✅ Correcto: +100 puntos";
    preguntaActual++;
  } else {
    chances--;
    puntos -= 30;
    boton.classList.add("incorrecta");
    document.getElementById("mensaje").innerText = "❌ Incorrecto: -30 puntos";

    if (chances <= 0) {
      localStorage.setItem("puntos", puntos);
      setTimeout(() => terminarJuego(false), 900);
      return;
    } else {
      preguntaActual++;
    }
  }

  localStorage.setItem("puntos", puntos);
  document.getElementById("score").innerText = "Puntos: " + puntos;
  document.getElementById("vidas").innerText = "Chances: " + chances;
  document.getElementById("progreso").style.width = ((preguntaActual) / totalPreguntas * 100) + "%";

  setTimeout(cargarPregunta, 1000);
}

function desactivarBotones() {
  for (let i = 0; i < 4; i++) {
    document.getElementById("op" + i).disabled = true;
  }
}

function terminarJuego(completado) {
  document.getElementById("juego").style.display = "none";
  document.getElementById("final").style.display = "block";
  document.getElementById("progreso").style.width = "100%";

  if (completado) {
    document.getElementById("tituloFinal").innerText = "🏆 Misión completada";
    document.getElementById("textoFinal").innerText = "Terminaste los 5 retos de hardware. Puntaje actual: " + puntos;
  } else {
    document.getElementById("tituloFinal").innerText = "💥 Sistema fallido";
    document.getElementById("textoFinal").innerText = "Te quedaste sin chances. Puntaje actual: " + puntos;
  }
}

function reiniciar() {
  iniciarJuego();
}
