<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hardware Arena Hacker</title>

<style>
*{box-sizing:border-box}

:root{
  --main:#00eaff;
  --accent:#00ff99;
  --danger:#ff244f;
}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#061b24 0%,#020507 50%,#000 100%);
  color:white;
  font-family:Consolas, Arial, sans-serif;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,234,255,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,234,255,.06) 1px,transparent 1px);
  background-size:38px 38px;
  animation:gridMove 13s linear infinite;
  pointer-events:none;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.035) 0px,
    rgba(255,255,255,.035) 1px,
    transparent 3px,
    transparent 7px
  );
  opacity:.28;
  pointer-events:none;
}

@keyframes gridMove{
  from{background-position:0 0}
  to{background-position:80px 80px}
}

.container{
  width:94%;
  max-width:1180px;
  margin:25px auto;
  padding:26px;
  border:1px solid var(--main);
  border-radius:22px;
  background:rgba(0,12,18,.9);
  box-shadow:0 0 38px rgba(0,234,255,.35);
  position:relative;
}

.header{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:center;
  flex-wrap:wrap;
  border-bottom:1px solid rgba(0,234,255,.45);
  padding-bottom:18px;
}

h1{
  margin:0;
  color:var(--main);
  font-size:42px;
  letter-spacing:2px;
  text-shadow:0 0 18px var(--main);
}

.sub{
  color:#bafaff;
  margin-top:8px;
}

.tag{
  border:1px solid var(--danger);
  color:var(--danger);
  padding:12px 18px;
  border-radius:999px;
  font-weight:bold;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  50%{opacity:.45}
}

.top{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin:22px 0;
}

.box{
  padding:14px;
  border:1px solid var(--main);
  border-radius:14px;
  background:rgba(0,234,255,.07);
  text-align:center;
  font-weight:bold;
}

.bar{
  height:14px;
  border:1px solid var(--main);
  border-radius:999px;
  overflow:hidden;
  background:#020202;
  margin-bottom:22px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--main),var(--accent));
  transition:.35s;
}

.game{
  display:grid;
  grid-template-columns:.95fr 1.05fr;
  gap:22px;
}

.terminal,.panel{
  border:1px solid rgba(0,234,255,.65);
  border-radius:18px;
  background:rgba(255,255,255,.035);
  overflow:hidden;
}

.terminalTop{
  padding:12px 16px;
  background:rgba(0,0,0,.68);
  border-bottom:1px solid var(--main);
  color:var(--main);
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.visual{
  min-height:340px;
  padding:28px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hardwareIcon{
  font-size:76px;
  margin-bottom:18px;
  filter:drop-shadow(0 0 16px var(--main));
  animation:float 2.8s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.readout{
  width:100%;
  border:1px solid rgba(0,234,255,.5);
  border-radius:14px;
  padding:18px;
  color:#cfffff;
  background:rgba(0,0,0,.35);
  line-height:1.6;
}

.panel{
  padding:24px;
}

.tipo{
  color:var(--accent);
  letter-spacing:2px;
  font-size:14px;
}

.pregunta{
  margin:18px 0;
  font-size:24px;
  color:white;
}

.opciones{
  display:grid;
  gap:13px;
}

button{
  padding:15px;
  border-radius:12px;
  border:1px solid var(--main);
  background:#020202;
  color:var(--main);
  cursor:pointer;
  transition:.18s;
  font-size:16px;
  font-family:Consolas, Arial, sans-serif;
}

button:hover{
  background:var(--main);
  color:#000;
  transform:translateY(-2px);
  box-shadow:0 0 18px var(--main);
}

.correcto{
  background:#00ff99!important;
  color:black!important;
  border-color:#00ff99!important;
}

.error{
  background:#ff244f!important;
  color:white!important;
  border-color:#ff244f!important;
}

.msg{
  min-height:38px;
  margin-top:18px;
  color:#ffdf7e;
  font-weight:bold;
}

.final{
  display:none;
  text-align:center;
  border:1px solid var(--main);
  border-radius:18px;
  padding:30px;
  background:rgba(255,255,255,.04);
}

.actions{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-top:22px;
}

.back{
  border-color:white;
  color:white;
}

.back:hover{
  background:white;
  color:black;
  box-shadow:none;
}

.hackline{
  color:var(--main);
  font-size:14px;
  margin-top:12px;
  min-height:22px;
}

@media(max-width:850px){
  .game{grid-template-columns:1fr}
  .top{grid-template-columns:1fr}
  h1{font-size:32px}
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>
      <h1>🛠 HARDWARE ARENA</h1>
      <div class="sub">Terminal de diagnóstico táctico | Ensamble, energía, rendimiento y fallas</div>
    </div>
    <div class="tag">PROTOCOLO SECRETO</div>
  </div>

  <div class="top">
    <div class="box" id="score">Puntos: 0</div>
    <div class="box" id="vidas">Vidas: 5 ❤️</div>
    <div class="box" id="contador">Diagnóstico: 1/5</div>
    <div class="box" id="estado">Estado: Escaneando</div>
  </div>

  <div class="bar">
    <div class="fill" id="progreso"></div>
  </div>

  <div class="game" id="juego">

    <div class="terminal">
      <div class="terminalTop">
        <span>● ● ● / hardware_diagnostic.exe</span>
        <span id="scan">SCAN...</span>
      </div>

      <div class="visual">
        <div class="hardwareIcon" id="icono">⚙️</div>
        <div class="readout" id="readout">
          Inicializando análisis de componentes...
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="tipo" id="tipo"></div>
      <div class="pregunta" id="pregunta"></div>

      <div class="opciones">
        <button id="op0" onclick="responder(0)"></button>
        <button id="op1" onclick="responder(1)"></button>
        <button id="op2" onclick="responder(2)"></button>
        <button id="op3" onclick="responder(3)"></button>
      </div>

      <div class="msg" id="mensaje"></div>
      <div class="hackline" id="hackline">Analizando buses, voltaje y compatibilidad...</div>
    </div>

  </div>

  <div class="final" id="final">
    <h2 id="tituloFinal"></h2>
    <p id="textoFinal"></p>

    <div class="actions">
      <button onclick="reiniciar()">🔁 Nuevo diagnóstico</button>
      <button class="back" onclick="window.location.href='index.html'">⬅ Volver al HUB</button>
    </div>
  </div>

  <div class="actions">
    <button class="back" onclick="window.location.href='index.html'">⬅ Volver al HUB</button>
  </div>

</div>

<script>
let puntos = 0;
let vidas = 5;
let actual = 0;
let total = 5;
let partida = [];

const bancoPreguntas = [
  {tipo:"GPU CORE",icono:"🎮",readout:"Renderización crítica detectada.<br>Prioridad: procesamiento gráfico.",pregunta:"¿Qué componente se encarga principalmente del procesamiento gráfico?",opciones:["GPU","RAM","SSD","Fuente de poder"],correcta:0,color:"#00eaff"},
  {tipo:"STORAGE",icono:"💾",readout:"Sistema requiere almacenamiento permanente.<br>Unidad recomendada: estado sólido.",pregunta:"¿Qué componente guarda datos de forma permanente?",opciones:["RAM","SSD","CPU","Disipador"],correcta:1,color:"#00ffaa"},
  {tipo:"CPU CORE",icono:"🧠",readout:"Núcleo central de cálculo detectado.<br>Procesamiento lógico activo.",pregunta:"¿Qué pieza es considerada el cerebro de la computadora?",opciones:["CPU","Monitor","Gabinete","Teclado"],correcta:0,color:"#00eaff"},
  {tipo:"MEMORY",icono:"🧬",readout:"Memoria temporal en operación.<br>Datos volátiles detectados.",pregunta:"¿Qué memoria se borra al apagar la computadora?",opciones:["SSD","RAM","HDD","USB"],correcta:1,color:"#aa00ff"},
  {tipo:"POWER",icono:"⚡",readout:"Voltaje de sistema inestable.<br>Se requiere fuente confiable.",pregunta:"¿Qué componente entrega energía a toda la PC?",opciones:["Fuente de poder","Tarjeta de red","Mouse","Ventilador RGB"],correcta:0,color:"#ffcc00"},

  {tipo:"SSD PROTOCOL",icono:"💽",readout:"Lectura rápida detectada.<br>Protocolo de almacenamiento activo.",pregunta:"¿Qué significa SSD?",opciones:["Solid State Drive","Super System Data","Software Storage Device","Simple Speed Disk"],correcta:0,color:"#00ffaa"},
  {tipo:"THERMAL",icono:"🌡️",readout:"Temperatura alta en procesador.<br>Refrigeración requerida.",pregunta:"¿Qué componente ayuda a mantener baja la temperatura del procesador?",opciones:["Disipador","Mouse","Monitor","Cable HDMI"],correcta:0,color:"#ff244f"},
  {tipo:"MOTHERBOARD",icono:"🔌",readout:"Nodo principal detectado.<br>Interconexión de componentes activa.",pregunta:"¿Qué pieza conecta todos los componentes principales?",opciones:["Placa madre","Bocinas","Webcam","Impresora"],correcta:0,color:"#00eaff"},
  {tipo:"BOOT SPEED",icono:"🚀",readout:"Arranque lento detectado.<br>Optimización de carga requerida.",pregunta:"¿Qué componente mejora la carga rápida de programas y sistema?",opciones:["SSD","Fuente genérica","Mousepad","Cámara"],correcta:0,color:"#00ffaa"},
  {tipo:"MULTITASK",icono:"📊",readout:"Carga múltiple de procesos.<br>Capacidad temporal necesaria.",pregunta:"¿Cuál es mejor para multitarea?",opciones:["16GB RAM","4GB RAM","Da igual","Ninguna"],correcta:0,color:"#aa00ff"},

  {tipo:"DISPLAY PORT",icono:"🖥️",readout:"Salida de video requerida.<br>Puerto moderno identificado.",pregunta:"¿Qué puerto se usa comúnmente para conectar un monitor moderno?",opciones:["HDMI","RJ45","USB-A","Audio Jack"],correcta:0,color:"#00eaff"},
  {tipo:"NETWORK",icono:"🌐",readout:"Conexión cableada detectada.<br>Interfaz de red necesaria.",pregunta:"¿Qué componente permite conexión a internet por cable?",opciones:["Tarjeta de red","GPU","RAM","Disco duro"],correcta:0,color:"#00ffaa"},
  {tipo:"GAMING CORE",icono:"🎯",readout:"FPS inestable detectado.<br>Render dedicado recomendado.",pregunta:"¿Qué es mejor para juegos?",opciones:["GPU dedicada","Gráficos integrados básicos","Ninguno","Impresora"],correcta:0,color:"#ff244f"},
  {tipo:"RAM BUFFER",icono:"📦",readout:"Sistema almacenando instrucciones temporales.",pregunta:"¿Qué componente almacena instrucciones temporales mientras trabajas?",opciones:["RAM","SSD","Gabinete","Monitor"],correcta:0,color:"#aa00ff"},
  {tipo:"POWER RISK",icono:"☠️",readout:"Alerta: fuente de baja calidad.<br>Riesgo físico del sistema.",pregunta:"¿Qué pasa si una fuente de poder es de mala calidad?",opciones:["Puede dañar componentes","Aumenta FPS","Mejora internet","Enfría la PC"],correcta:0,color:"#ff244f"}
];

function mezclar(array){
  return array.sort(() => Math.random() - 0.5);
}

function aplicarColor(color){
  document.documentElement.style.setProperty("--main", color);
  document.body.style.background =
    "radial-gradient(circle at top, " + color + "33 0%, #020507 48%, #000 100%)";
}

function iniciarJuego(){
  puntos = 0;
  vidas = 5;
  actual = 0;
  partida = mezclar([...bancoPreguntas]).slice(0,total);

  document.getElementById("juego").style.display = "grid";
  document.getElementById("final").style.display = "none";
  cargarPregunta();
}

function cargarPregunta(){
  if(actual >= total){
    terminarJuego(true);
    return;
  }

  let p = partida[actual];
  aplicarColor(p.color);

  document.getElementById("tipo").innerText = "MODO: " + p.tipo;
  document.getElementById("icono").innerText = p.icono;
  document.getElementById("readout").innerHTML = p.readout;
  document.getElementById("pregunta").innerText = p.pregunta;
  document.getElementById("contador").innerText = "Diagnóstico: " + (actual + 1) + "/5";
  document.getElementById("score").innerText = "Puntos: " + puntos;
  document.getElementById("vidas").innerText = "Vidas: " + vidas + " ❤️";
  document.getElementById("estado").innerText = "Estado: Activo";
  document.getElementById("scan").innerText = "SCAN " + (actual + 1) + "/5";
  document.getElementById("progreso").style.width = ((actual / total) * 100) + "%";
  document.getElementById("mensaje").innerText = "";
  document.getElementById("hackline").innerText = "Analizando compatibilidad, energía y rendimiento...";

  let opcionesMezcladas = p.opciones.map((texto,index)=>{
    return {texto:texto, ok:index === p.correcta};
  });

  opcionesMezcladas = mezclar(opcionesMezcladas);

  for(let i=0;i<4;i++){
    let boton = document.getElementById("op"+i);
    boton.innerText = opcionesMezcladas[i].texto;
    boton.dataset.ok = opcionesMezcladas[i].ok;
    boton.disabled = false;
    boton.className = "";
  }
}

function responder(num){
  let boton = document.getElementById("op"+num);
  let ok = boton.dataset.ok === "true";

  for(let i=0;i<4;i++){
    document.getElementById("op"+i).disabled = true;
  }

  if(ok){
    puntos += 100;
    boton.classList.add("correcto");
    document.getElementById("mensaje").innerText = "✅ DIAGNÓSTICO CORRECTO +100";
    document.getElementById("hackline").innerText = "Componente validado. Sistema estable.";
  }else{
    puntos -= 20;
    vidas--;
    boton.classList.add("error");
    document.getElementById("mensaje").innerText = "❌ ERROR DE DIAGNÓSTICO -20";
    document.getElementById("hackline").innerText = "Fallo detectado. Integridad reducida.";
  }

  actual++;

  document.getElementById("score").innerText = "Puntos: " + puntos;
  document.getElementById("vidas").innerText = "Vidas: " + vidas + " ❤️";
  document.getElementById("progreso").style.width = ((actual / total) * 100) + "%";

  if(vidas <= 0){
    setTimeout(()=>terminarJuego(false),900);
    return;
  }

  setTimeout(cargarPregunta,950);
}

function terminarJuego(completado){
  document.getElementById("juego").style.display = "none";
  document.getElementById("final").style.display = "block";
  document.getElementById("progreso").style.width = "100%";

  localStorage.setItem("hardwareScore", puntos);

  if(completado){
    document.getElementById("tituloFinal").innerText = "🏆 DIAGNÓSTICO COMPLETADO";
    document.getElementById("textoFinal").innerText =
      "Terminaste los 5 retos de hardware. Puntaje obtenido: " + puntos;
  }else{
    document.getElementById("tituloFinal").innerText = "☠ SISTEMA COMPROMETIDO";
    document.getElementById("textoFinal").innerText =
      "Te quedaste sin vidas. Puntaje obtenido: " + puntos;
  }
}

function reiniciar(){
  iniciarJuego();
}

iniciarJuego();
</script>

</body>
</html>
