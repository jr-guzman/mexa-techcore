<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Programación Arena</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(135deg, #180006 0%, #050505 45%, #21000b 100%);
  color: #fff;
  font-family: Arial, sans-serif;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 0, 60, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 0, 60, 0.08) 1px, transparent 1px);
  background-size: 35px 35px;
  pointer-events: none;
}

.contenedor {
  width: 92%;
  max-width: 1050px;
  margin: 35px auto;
  padding: 32px;
  border-radius: 24px;
  background: rgba(10, 0, 4, 0.88);
  border: 1px solid #ff174d;
  box-shadow: 0 0 35px rgba(255, 23, 77, 0.35);
  position: relative;
}

.header {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(255, 23, 77, 0.5);
  padding-bottom: 20px;
}

.titulo {
  text-align: left;
}

h1 {
  margin: 0;
  font-size: 42px;
  color: #ff174d;
  letter-spacing: 1px;
}

.subtitulo {
  color: #ffb3c4;
  margin-top: 8px;
}

.badge {
  background: rgba(255, 23, 77, 0.15);
  border: 1px solid #ff174d;
  padding: 12px 18px;
  border-radius: 999px;
  color: #fff;
  font-weight: bold;
}

.panel {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin: 25px 0;
}

.caja {
  background: linear-gradient(180deg, rgba(255,23,77,0.18), rgba(255,23,77,0.04));
  border: 1px solid rgba(255, 23, 77, 0.75);
  padding: 16px;
  border-radius: 16px;
  text-align: center;
  font-weight: bold;
}

.barra {
  width: 100%;
  height: 16px;
  background: #170008;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid #ff174d;
  margin-bottom: 25px;
}

.progreso {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff174d, #ff7a00);
  transition: 0.35s;
}

.juego {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 25px;
}

.terminal {
  background: #08080b;
  border: 1px solid #ff174d;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: inset 0 0 20px rgba(255,23,77,0.12);
}

.terminal-top {
  background: #160008;
  padding: 12px 15px;
  border-bottom: 1px solid #ff174d;
  color: #ffb3c4;
  text-align: left;
  font-size: 14px;
}

.codigo {
  padding: 25px;
  color: #ffdf7e;
  text-align: left;
  font-family: Consolas, monospace;
  font-size: 20px;
  min-height: 180px;
  white-space: pre-wrap;
}

.tarjeta {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255, 23, 77, 0.65);
  border-radius: 18px;
  padding: 24px;
}

.pregunta {
  font-size: 24px;
  color: white;
  margin-bottom: 20px;
}

.opciones {
  display: grid;
  gap: 14px;
}

button {
  padding: 16px 18px;
  font-size: 16px;
  background: #090006;
  color: #fff;
  border: 1px solid #ff174d;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #ff174d;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(255, 23, 77, 0.6);
}

.correcta {
  background: #00ff99 !important;
  color: black !important;
  border-color: #00ff99 !important;
}

.incorrecta {
  background: #ff0033 !important;
  color: white !important;
  border-color: #ff0033 !important;
}

.mensaje {
  margin-top: 18px;
  min-height: 35px;
  font-weight: bold;
  color: #ffdf7e;
}

.final {
  display: none;
  margin-top: 25px;
}

.acciones {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.volver {
  border-color: #ffffff;
}

.volver:hover {
  background: white;
  color: black;
  box-shadow: none;
}

@media (max-width: 800px) {
  .juego {
    grid-template-columns: 1fr;
  }

  .panel {
    grid-template-columns: 1fr;
  }

  h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<div class="contenedor">

  <div class="header">
    <div class="titulo">
      <h1>💻 CODE RED ARENA</h1>
      <p class="subtitulo">Resuelve retos de programación. 5 preguntas aleatorias, solo 2 chances.</p>
    </div>
    <div class="badge">Módulo Programación</div>
  </div>

  <div class="panel">
    <div class="caja" id="score">Puntos: 0</div>
    <div class="caja" id="vidas">Chances: 2</div>
    <div class="caja" id="contador">Pregunta: 1/5</div>
  </div>

  <div class="barra">
    <div class="progreso" id="progreso"></div>
  </div>

  <div class="juego" id="juego">
    <div class="terminal">
      <div class="terminal-top">● ● ● / sistema_programacion.exe</div>
      <div class="codigo" id="codigo"></div>
    </div>

    <div class="tarjeta">
      <div class="pregunta" id="pregunta"></div>

      <div class="opciones">
        <button id="op0" onclick="responder(0)"></button>
        <button id="op1" onclick="responder(1)"></button>
        <button id="op2" onclick="responder(2)"></button>
        <button id="op3" onclick="responder(3)"></button>
      </div>

      <div class="mensaje" id="mensaje"></div>
    </div>
  </div>

  <div class="tarjeta final" id="final">
    <h2 id="tituloFinal"></h2>
    <p id="textoFinal"></p>
    <div class="acciones">
      <button onclick="reiniciar()">🔁 Jugar otra vez</button>
      <button class="volver" onclick="window.location.href='index.html'">⬅ Volver al HUB</button>
    </div>
  </div>

  <div class="acciones">
    <button class="volver" onclick="window.location.href='index.html'">⬅ Volver al HUB</button>
  </div>

</div>

<script>

  {

    codigo: "<button onclick='jugar()'>",

  {

function mezclar(array) {
  return array.sort(() => Math.random() - 0.5);
}

function iniciarJuego() {
  preguntasPartida = mezclar([...bancoPreguntas]).slice(0, totalPreguntas);
  preguntaActual = 0;
  chances = 2;

  document.getElementById("juego").style.display = "grid";
  document.getElementById("final").style.display = "none";

  cargarPregunta();
}

function cargarPregunta() {
  if (preguntaActual >= totalPreguntas) {
    terminarJuego(true);
    return;
  }

  let p = preguntasPartida[preguntaActual];

  document.getElementById("pregunta").innerText = p.pregunta;
  document.getElementById("codigo").innerText = p.codigo;
  document.getElementById("contador").innerText = "Pregunta: " + (preguntaActual + 1) + "/" + totalPreguntas;
  document.getElementById("vidas").innerText = "Chances: " + chances;
  document.getElementById("score").innerText = "Puntos: " + puntos;
  document.getElementById("progreso").style.width = ((preguntaActual) / totalPreguntas * 100) + "%";
  document.getElementById("mensaje").innerText = "";

  let opcionesMezcladas = p.opciones.map((texto, index) => {
    return { texto: texto, esCorrecta: index === p.correcta };
  });

  opcionesMezcladas = mezclar(opcionesMezcladas);

  for (let i = 0; i < 4; i++) {
    let boton = document.getElementById("op" + i);
    boton.innerText = opcionesMezcladas[i].texto;
    boton.dataset.correcta = opcionesMezcladas[i].esCorrecta;
    boton.disabled = false;
    boton.className = "";
  }
}

function responder(num) {
  let boton = document.getElementById("op" + num);
  let esCorrecta = boton.dataset.correcta === "true";

  desactivarBotones();

  if (esCorrecta) {
    puntos += 100;
    boton.classList.add("correcta");
    document.getElementById("mensaje").innerText = "✅ Correcto: +100 puntos";
    preguntaActual++;
  } else {
    chances--;
    puntos -= 30;
    boton.classList.add("incorrecta");
    document.getElementById("mensaje").innerText = "❌ Incorrecto: -30 puntos";

    if (chances <= 0) {
      localStorage.setItem("puntos", puntos);
      setTimeout(() => terminarJuego(false), 900);
      return;
    } else {
      preguntaActual++;
    }
  }

  localStorage.setItem("puntos", puntos);
  document.getElementById("score").innerText = "Puntos: " + puntos;
  document.getElementById("vidas").innerText = "Chances: " + chances;
  document.getElementById("progreso").style.width = ((preguntaActual) / totalPreguntas * 100) + "%";

  setTimeout(cargarPregunta, 1000);
}

function desactivarBotones() {
  for (let i = 0; i < 4; i++) {
    document.getElementById("op" + i).disabled = true;
  }
}

function terminarJuego(completado) {
  document.getElementById("juego").style.display = "none";
  document.getElementById("final").style.display = "block";
  document.getElementById("progreso").style.width = "100%";

  if (completado) {
    document.getElementById("tituloFinal").innerText = "🏆 Código estabilizado";
    document.getElementById("textoFinal").innerText = "Terminaste los 5 retos de programación. Puntaje actual: " + puntos;
  } else {
    document.getElementById("tituloFinal").innerText = "💥 Sistema bloqueado";
    document.getElementById("textoFinal").innerText = "Te quedaste sin chances. Puntaje actual: " + puntos;
  }
}

function reiniciar() {
  iniciarJuego();
}

iniciarJuego();
</script>
